<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
/* Page-specific: watchlist grid */
.watchlist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.wl-card { background: var(--bg-secondary); border: 1px solid var(--border-primary); border-radius: var(--radius-md); padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; transition: border-color var(--transition-normal); }
.wl-card:hover { border-color: var(--color-info); }
.wl-card .symbol { font-weight: 600; color: var(--text-primary); font-size: 14px; }
.wl-card .price  { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }
.stats-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
</style>
</head>
<body>

<header class="app-header">
  <h1>Market Intelligence</h1>
  <nav class="nav-links">
    <a href="/trading">Trading</a>
    <a href="/chart">Grafik</a>
    <a href="/backtest">Backtest</a>
    <a href="/monitor">Monitor</a>
    <a href="/settings">Ayarlar</a>
    <a href="/collector">Veri</a>
  </nav>
  <div class="conn-status" id="status">
    <span class="conn-dot"></span>
    <span id="statusText">Disconnected</span>
  </div>
  <div class="search-box hide-mobile">
    <input type="text" id="search" placeholder="Sembol ara... (ETH, SOL)" autocomplete="off">
  </div>
  <div class="stats-text" id="stats"></div>
</header>

<div class="container">
  <!-- Mobile search -->
  <div class="show-mobile" style="display:none;margin-bottom:12px">
    <input type="text" id="searchMobile" placeholder="Sembol ara..." autocomplete="off" style="width:100%">
  </div>

  <div id="watchlistSection" style="margin-bottom:24px">
    <div class="section-title">Watchlist</div>
    <div class="watchlist-grid" id="watchlist"></div>
  </div>

  <div>
    <div class="section-title">All Symbols</div>
    <div class="tbl-card">
      <div class="scroll-area" style="max-height:none">
        <table>
          <thead>
            <tr>
              <th class="sortable sorted-asc" data-col="symbol"># Symbol</th>
              <th class="sortable" data-col="price">Price (USDT)</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="empty-state" id="noData">Connecting to price stream...</div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="/static/components.js"></script>
<script>
(function(){
  const WATCHLIST = ['BTCUSDT','XRPUSDT','AVAXUSDT','DOGEUSDT','ETHUSDT','SOLUSDT'];

  const tbody = $('tbody');
  const watchlistEl = $('watchlist');
  const watchlistSection = $('watchlistSection');
  const statusEl = $('status');
  const statusText = $('statusText');
  const statsEl = $('stats');
  const noDataEl = $('noData');
  const searchInput = $('search');
  const searchMobile = $('searchMobile');

  let sortCol = 'symbol';
  let sortDir = 1;
  let searchTerm = '';
  let updateCount = 0;

  // ── WebSocket ──
  const stream = new PriceStream({
    onConnect() {
      statusEl.classList.add('connected');
      statusText.textContent = 'Connected';
      noDataEl.style.display = 'none';
    },
    onPrices(prices, prev) {
      updateCount++;
      render();
    },
    onDisconnect() {
      statusEl.classList.remove('connected');
      statusText.textContent = 'Reconnecting...';
    }
  });

  // ── Sorting ──
  document.querySelectorAll('th.sortable').forEach(function(th) {
    th.addEventListener('click', function() {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll('th.sortable').forEach(t => t.classList.remove('sorted-asc','sorted-desc'));
      th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
      render();
    });
  });

  // ── Search (debounced) ──
  var onSearch = debounce(function(e) {
    searchTerm = e.target.value.toUpperCase().trim();
    render();
  }, 200);
  if (searchInput) searchInput.addEventListener('input', onSearch);
  if (searchMobile) searchMobile.addEventListener('input', onSearch);

  // ── Render ──
  function render() {
    const prices = stream.prices;
    const keys = Object.keys(prices);
    if (keys.length === 0) return;

    statsEl.textContent = keys.length + ' sembol | #' + updateCount;

    // Watchlist
    const wlVisible = searchTerm === '';
    watchlistSection.style.display = wlVisible ? '' : 'none';
    if (wlVisible) {
      let wlHtml = '';
      WATCHLIST.forEach(function(sym) {
        const p = prices[sym];
        if (!p) return;
        const cls = stream.getPriceClass(sym);
        wlHtml += '<div class="wl-card"><span class="symbol">' + sym.replace('USDT','') + '</span><span class="price ' + cls + '">' + Fmt.price(p) + '</span></div>';
      });
      watchlistEl.innerHTML = wlHtml;
    }

    // Filter & sort
    let filtered = keys;
    if (searchTerm) {
      filtered = keys.filter(k => k.indexOf(searchTerm) !== -1);
    }
    filtered.sort(function(a, b) {
      if (sortCol === 'price') return (parseFloat(prices[a]) - parseFloat(prices[b])) * sortDir;
      return a.localeCompare(b) * sortDir;
    });

    // Table
    let html = '';
    for (let i = 0; i < filtered.length; i++) {
      const sym = filtered[i];
      const p = prices[sym];
      const cls = stream.getPriceClass(sym);
      const flash = stream.getFlashClass(sym);
      html += '<tr class="' + flash + '"><td>' + (i+1) + '  ' + sym + '</td><td class="' + cls + '">' + Fmt.price(p) + '</td></tr>';
    }
    tbody.innerHTML = html;
  }

  stream.connect();
  renderBottomNav('market');
})();
</script>

</body>
</html>
